run:
  timeout: 5m
  go: "1.25"

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - misspell
    - gocritic
    - gofmt
    - goimports

linters-settings:
  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: context-as-argument
      - name: context-keys-type
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: if-return
      - name: increment-decrement
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id
  goimports:
    local-prefixes: github.com/mrhaoxx/devpod

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - revive
