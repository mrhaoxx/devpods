image:
  controller:
    repository: ghcr.io/mrhaoxx/devpod-controller
    tag: dev
    pullPolicy: IfNotPresent
  gateway:
    repository: ghcr.io/mrhaoxx/devpod-gateway
    tag: dev
    pullPolicy: IfNotPresent
  supervisor:
    repository: ghcr.io/mrhaoxx/devpod-supervisor
    tag: dev
  snapshot:
    repository: docker
    tag: cli
  webui:
    repository: ghcr.io/mrhaoxx/devpod-webui
    tag: dev
    pullPolicy: IfNotPresent

namespaces:
  system: devpod-system
  devpods: devpods

controller:
  replicas: 1
  resources:
    requests: {cpu: 100m, memory: 128Mi}
    limits:   {cpu: 500m, memory: 512Mi}

gateway:
  replicas: 2
  resources:
    requests: {cpu: 100m, memory: 128Mi}
    limits:   {cpu: 500m, memory: 512Mi}
  service:
    type: ClusterIP
    port: 22
  ldap:
    enabled: false
    url: ""
    bindDN: ""
    baseDN: ""
    userFilter: ""             # blank → controller default
    pubkeyAttribute: sshPublicKey
    requestTimeoutSeconds: 5
    cacheTTLSeconds: 300
    negativeCacheTTLSeconds: 30
    staleGraceSeconds: 900
    # Secrets MUST exist before the chart is installed. The chart
    # only references them; it does not generate them. Operators
    # create the Secrets out of band (or via a sealed-secret /
    # external-secrets pipeline).
    #
    # IMPORTANT: both Secrets must live in the same namespace as the
    # gateway Deployment (Values.namespaces.system). Cross-namespace
    # Secret mounts are not supported.
    caSecret:
      name: ""                 # secretRef.name; key "ca.crt"
      namespace: ""            # secretRef.namespace (informational; mount uses Pod's namespace)
    bindPasswordSecret:
      name: ""
      namespace: ""            # secretRef.namespace (informational)


webui:
  enabled: false
  replicas: 2
  resources:
    requests: {cpu: 100m, memory: 128Mi}
    limits:   {cpu: 500m, memory: 512Mi}
  service:
    type: ClusterIP
    port: 80
  # External URL of the UI; the OAuth redirect URL becomes
  # baseURL + /auth/callback. An http:// baseURL disables the Secure
  # cookie attribute (dev/e2e only — use https in production).
  baseURL: ""
  userPrefix: ""                 # GitLab user xxxx → DevPod user <prefix>xxxx
  admins: []                     # usernames granted admin (also via User.spec.admin, kubectl)
  kore: auto                     # auto | on | off
  # Built-in username+password login (independent of OAuth). Admins
  # create users in the UI; who is an admin is set via kubectl
  # (User.spec.admin). At least one of passwordAuth / gitlab.issuerURL
  # must be enabled.
  passwordAuth: false
  passwordMinLength: 8
  # Let users edit User.spec.pubkeys via the UI. Disable when SSH keys
  # are managed externally (e.g. LDAP is the source of truth).
  pubkeySelfService: true
  # Gateway address rendered into `ssh [-p port] user+pod@host` command
  # lines, host or host:port. Empty → a <gateway> placeholder is shown.
  sshAdvertise: ""
  gitlab:
    issuerURL: ""
    clientID: ""
    # Secret with key "client-secret"; must pre-exist in namespaces.system.
    clientSecretSecret: {name: ""}
  # Secret with key "session-key" (>= 32 random bytes); must pre-exist
  # in namespaces.system. All replicas share it (stateless sessions).
  sessionKeySecret: {name: ""}
  defaultQuota:
    maxDevPods: 3
    compute: {cpu: "8", memory: "16Gi"}
    storage: "50Gi"
