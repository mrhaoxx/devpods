{{- if .Values.webui.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: devpod-webui-quota
  namespace: {{ .Values.namespaces.system }}
  labels: {{ include "devpod.labels" . | nindent 4 }}
data:
  default-quota.yaml: |
{{ toYaml .Values.webui.defaultQuota | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devpod-webui
  namespace: {{ .Values.namespaces.system }}
  labels: {{ include "devpod.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.webui.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: devpod-webui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devpod-webui
      annotations:
        checksum/quota: {{ toYaml .Values.webui.defaultQuota | sha256sum }}
    spec:
      serviceAccountName: devpod-webui
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
      - name: webui
        image: "{{ .Values.image.webui.repository }}:{{ .Values.image.webui.tag }}"
        imagePullPolicy: {{ .Values.image.webui.pullPolicy }}
        args:
        - --listen=:8080
        - --session-key-file=/etc/devpod/webui/session/session-key
        - --default-quota-file=/etc/devpod/webui/default-quota.yaml
        - --devpod-namespace={{ .Values.namespaces.devpods }}
        - --kore={{ .Values.webui.kore }}
        - --admins={{ join "," .Values.webui.admins }}
        {{- if .Values.webui.baseURL }}
        - --external-url={{ .Values.webui.baseURL }}
        {{- end }}
        {{- if .Values.webui.passwordAuth }}
        - --password-auth=true
        - --password-min-length={{ .Values.webui.passwordMinLength }}
        {{- end }}
        {{- if .Values.webui.gitlab.issuerURL }}
        - --gitlab-issuer-url={{ .Values.webui.gitlab.issuerURL }}
        - --oauth-client-id={{ required "webui.gitlab.clientID is required when gitlab.issuerURL is set" .Values.webui.gitlab.clientID }}
        - --oauth-client-secret-file=/etc/devpod/webui/oauth/client-secret
        - --redirect-url={{ required "webui.baseURL is required for OAuth" .Values.webui.baseURL }}/auth/callback
        - --user-prefix={{ .Values.webui.userPrefix }}
        {{- end }}
        {{- if hasKey .Values.webui "pubkeySelfService" }}
        - --pubkey-self-service={{ .Values.webui.pubkeySelfService }}
        {{- end }}
        {{- if .Values.webui.sshAdvertise }}
        - --ssh-advertise={{ .Values.webui.sshAdvertise }}
        {{- end }}
        ports:
        - {name: http, containerPort: 8080}
        readinessProbe:
          httpGet: {path: /healthz, port: http}
        resources: {{- toYaml .Values.webui.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: {drop: [ALL]}
          readOnlyRootFilesystem: true
        volumeMounts:
        {{- if .Values.webui.gitlab.issuerURL }}
        - {name: oauth, mountPath: /etc/devpod/webui/oauth, readOnly: true}
        {{- end }}
        - {name: session, mountPath: /etc/devpod/webui/session, readOnly: true}
        - {name: quota, mountPath: /etc/devpod/webui/default-quota.yaml, subPath: default-quota.yaml, readOnly: true}
      volumes:
      {{- if .Values.webui.gitlab.issuerURL }}
      - name: oauth
        secret:
          secretName: {{ required "webui.gitlab.clientSecretSecret.name is required for OAuth" .Values.webui.gitlab.clientSecretSecret.name }}
      {{- end }}
      - name: session
        secret:
          secretName: {{ required "webui.sessionKeySecret.name is required" .Values.webui.sessionKeySecret.name }}
      - name: quota
        configMap:
          name: devpod-webui-quota
---
apiVersion: v1
kind: Service
metadata:
  name: devpod-webui
  namespace: {{ .Values.namespaces.system }}
  labels: {{ include "devpod.labels" . | nindent 4 }}
spec:
  type: {{ .Values.webui.service.type }}
  selector:
    app.kubernetes.io/name: devpod-webui
  ports:
  - {name: http, port: {{ .Values.webui.service.port }}, targetPort: http}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: devpod-webui
  namespace: {{ .Values.namespaces.system }}
  labels: {{ include "devpod.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: devpod-webui
  policyTypes: [Ingress]
  ingress:
  - ports: [{port: 8080}]
{{- end }}
