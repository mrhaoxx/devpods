apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespaces.system }}
  labels:
    kubernetes.io/metadata.name: {{ .Values.namespaces.system }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespaces.devpods }}
  labels:
    kubernetes.io/metadata.name: {{ .Values.namespaces.devpods }}
    # Privileged is required because snapshot Jobs mount the Docker
    # socket via hostPath. Ordinary DevPod containers don't need
    # privilege escalation — the PodSecurity posture here is the
    # ceiling, not the floor; per-pod restrictions are enforced via
    # RBAC (users can only create DevPod CRs, not raw Pods).
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
