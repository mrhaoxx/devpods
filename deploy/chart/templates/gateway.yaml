apiVersion: apps/v1
kind: Deployment
metadata:
  name: devpod-gateway
  namespace: {{ .Values.namespaces.system }}
  labels: {{ include "devpod.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: devpod-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devpod-gateway
    spec:
      serviceAccountName: devpod-gateway
      containers:
      - name: gateway
        image: "{{ .Values.image.gateway.repository }}:{{ .Values.image.gateway.tag }}"
        imagePullPolicy: {{ .Values.image.gateway.pullPolicy }}
        args:
        - --listen=:22
        - --host-key-dir=/etc/devpod/gateway
        ports:
        - {name: ssh,     containerPort: 22}
        - {name: metrics, containerPort: 8080}
        # SSH listens on port 22 (privileged). Grant only NET_BIND_SERVICE
        # so the container can bind <1024 without running as root.
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
            add: ["NET_BIND_SERVICE"]
        volumeMounts:
        - name: host-key
          mountPath: /etc/devpod/gateway
          readOnly: true
        - name: internal-key
          mountPath: /etc/devpod/gateway/internal
          readOnly: true
        {{- if .Values.gateway.ldap.enabled }}
        - name: ldap-secrets
          mountPath: /etc/devpod/gateway/ldap
          readOnly: true
        {{- end }}
        resources: {{- toYaml .Values.gateway.resources | nindent 10 }}
        readinessProbe:
          tcpSocket: {port: ssh}
          initialDelaySeconds: 2
        livenessProbe:
          tcpSocket: {port: ssh}
          periodSeconds: 30
      volumes:
      - name: host-key
        secret:
          secretName: devpod-gateway-host-key
      - name: internal-key
        secret:
          secretName: devpod-gateway-internal-key
      {{- if .Values.gateway.ldap.enabled }}
      - name: ldap-secrets
        projected:
          sources:
          - secret:
              name: {{ required "gateway.ldap.caSecret.name is required when ldap is enabled" .Values.gateway.ldap.caSecret.name | quote }}
              items:
              - key: ca.crt
                path: ca.crt
          - secret:
              name: {{ required "gateway.ldap.bindPasswordSecret.name is required when ldap is enabled" .Values.gateway.ldap.bindPasswordSecret.name | quote }}
              items:
              - key: password
                path: password
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: devpod-gateway
  namespace: {{ .Values.namespaces.system }}
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    app.kubernetes.io/name: devpod-gateway
  ports:
  - port: {{ .Values.gateway.service.port }}
    targetPort: ssh
